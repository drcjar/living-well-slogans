name: check

# Runs on every pull request. This is the gate: evidence integrity, a clean
# build, and internal links that resolve with no external requests.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # The whole point of the project: fail if a figure is unsourced or missing
      # from the provenance ledger, or a page drifts from the required shape.
      - name: Evidence integrity
        run: npm run check

      - name: Build
        run: npm run build

      # The Slides page links to the decks, so they must exist before the link
      # check runs. Chromium is needed only for the PDF decks.
      - name: Install Chromium for the PDF decks
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome

      # Ubuntu 23.10+ runners restrict unprivileged user namespaces via AppArmor,
      # which stops Chromium's sandbox launching. Re-enable it so the PDFs render.
      - name: Allow Chromium sandbox
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Build decks (HTML + PDF)
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run deck

      - name: Links + no external requests
        run: npm run check:links
