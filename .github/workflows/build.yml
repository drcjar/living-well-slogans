name: build

# Build the site and the deck, gate on the evidence check, then publish to the
# gh-pages branch on push to main. Pages is configured to serve from gh-pages
# (Settings -> Pages -> Deploy from a branch: gh-pages / root), served under the
# account's carlreynolds.net apex at /living-well-slogans/.
on:
  push:
    branches: [main]
  workflow_dispatch:

# The default GITHUB_TOKEN needs write access to push the built site.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Never deploy content that fails the evidence bar.
      - name: Evidence integrity
        run: npm run check

      - name: Build site
        run: npm run build

      # Chromium is needed only for the PDF deck; the HTML deck needs no browser.
      - name: Install Chromium for the PDF deck
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome

      # Ubuntu 23.10+ runners restrict unprivileged user namespaces via AppArmor,
      # which stops Chromium's sandbox launching ("No usable sandbox"). Re-enable
      # it so the PDF deck can render. `|| true` keeps older kernels (no such key)
      # from failing the build.
      - name: Allow Chromium sandbox
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Build deck (HTML + PDF)
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run deck

      - name: Link + purity check
        run: npm run check:links

      - name: Publish to gh-pages
        run: |
          cd _site
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} [skip ci]"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
